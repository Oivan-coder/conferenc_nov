<script>
function hideRclsmoLoader(){
  const el=document.querySelector('.loader');
  if(!el) return;
  el.style.transition='opacity .65s ease, transform .65s ease, filter .65s ease';
  el.style.opacity='0';
  el.style.transform='scale(.985)';
  el.style.filter='blur(4px)';
  setTimeout(()=>el.remove(),720);
}
</script>

<script>
  window.addEventListener('load', () => {
    window.setTimeout(() => document.querySelector('.loader')?.classList.add('settled'), 6100);
  });
  window.hideRclsmoLoader = function(){
    const loader = document.querySelector('.loader');
    if(!loader) return;
    loader.style.transition = 'opacity .55s ease, transform .55s ease, filter .55s ease';
    loader.style.opacity = '0';
    loader.style.transform = 'scale(.985)';
    loader.style.filter = 'blur(3px)';
    window.setTimeout(() => loader.remove(), 650);
  }
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Просмотр отчета | РЦЛСМО</title>
    <link rel="icon" type="image/png" href="images/favicon-32x32.png">
    <style>
        :root {
            --bg: #081220;
            --panel: rgba(9, 20, 35, 0.94);
            --line: rgba(0, 229, 255, 0.22);
            --text: #edf6ff;
            --muted: #9fb5ce;
            --accent: #00e5ff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
        }

        .viewer-shell {
            display: grid;
            grid-template-rows: auto 1fr;
            width: 100%;
            height: 100%;
        }

        .viewer-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 58px;
            padding: 10px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(18px);
            z-index: 2;
        }

        .viewer-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            color: var(--text);
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .viewer-brand img {
            width: 32px;
            height: 32px;
            flex: 0 0 auto;
        }

        .viewer-brand span {
            white-space: nowrap;
        }

        .viewer-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            min-width: 0;
        }

        .viewer-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 14px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .viewer-link--primary {
            background: linear-gradient(135deg, #00e5ff, #7ddff0);
            color: #05111e;
            border-color: transparent;
        }

        .viewer-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #05101d;
        }

        .viewer-error {
            display: none;
            place-items: center;
            height: 100%;
            padding: 24px;
            text-align: center;
            color: var(--muted);
        }

        .viewer-error strong {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 1.2rem;
        }

        @media (max-width: 640px) {
            .viewer-bar {
                min-height: 62px;
                padding: 10px;
            }

            .viewer-brand {
                gap: 8px;
                font-size: 0.84rem;
            }

            .viewer-brand img {
                width: 30px;
                height: 30px;
            }

            .viewer-actions {
                gap: 6px;
            }

            .viewer-link {
                min-height: 36px;
                padding: 0 10px;
                font-size: 0.82rem;
            }

            .viewer-link[data-secondary] {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="viewer-shell">
        <header class="viewer-bar">
            <a class="viewer-brand" href="/" aria-label="На главную">
                <img src="images/logo.png" alt="">
                <span>РЦЛСМО</span>
            </a>
            <nav class="viewer-actions" aria-label="Навигация отчета">
                <a class="viewer-link viewer-link--primary" href="/">На сайт</a>
                <a class="viewer-link" href="/reports" data-secondary>К архиву</a>
                <a class="viewer-link" href="#" id="openRawReport" data-secondary target="_blank" rel="noopener noreferrer">Открыть отдельно</a>
            </nav>
        </header>

        <iframe class="viewer-frame" id="reportFrame" title="Отчет"></iframe>
        <div class="viewer-error" id="viewerError">
            <div>
                <strong>Отчет не найден</strong>
                <span>Вернитесь в архив отчетов и выберите выпуск из списка.</span>
            </div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const reportPath = params.get('report') || '';
        const allowedReport = /^reports\/weekly-report-\d{4}-\d{2}-\d{2}\.html$/.test(reportPath);
        const frame = document.getElementById('reportFrame');
        const error = document.getElementById('viewerError');
        const rawLink = document.getElementById('openRawReport');

        if (allowedReport) {
            frame.src = reportPath;
            rawLink.href = reportPath;
        } else {
            frame.remove();
            error.style.display = 'grid';
            rawLink.removeAttribute('href');
        }
    </script>
</body>
</html>
